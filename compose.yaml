name: metro-now

services:
    web:
        image: metro-now_web
        container_name: web
        pull_policy: build
        restart: always
        ports:
            - 3000:3000
        env_file:
            - ".env.web.docker"
        build:
            context: .
            dockerfile: ./Dockerfile
            target: metro-now_web

        healthcheck:
            test: ["CMD", "curl", "-f", "http://host.docker.internal:3000/"]
            interval: 30s
            timeout: 5s
            retries: 5

    redis-stack:
        image: redis/redis-stack:latest
        container_name: redis-stack
        restart: always
        ports:
            - 6479:6379
            - 8101:8001
        extra_hosts:
            - "host.docker.internal:host-gateway"

    postgres:
        container_name: postgres
        image: postgres:16-alpine
        restart: always
        ports:
            - 5532:5432
        volumes:
            - postgres-data:/var/lib/postgresql/data/
        env_file:
            - ".env.docker"
        extra_hosts:
            - "host.docker.internal:host-gateway"

    backend:
        image: metro-now_backend
        container_name: backend
        pull_policy: build
        command:
            - /bin/bash
            - -c
            - |
                pnpm start:prod
        depends_on:
            - postgres
            - redis-stack
        build:
            context: .
            dockerfile: ./Dockerfile
            target: metro-now_backend

        restart: always
        ports:
            - 3001:3001
        volumes:
            - backend-data:/app
        env_file:
            - ".env.docker"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://host.docker.internal:3001/"]
            interval: 30s
            start_period: 300s
            timeout: 10s
            retries: 5

    dataloader:
        image: metro-now_dataloader
        container_name: dataloader
        pull_policy: build
        build:
            context: .
            dockerfile: ./Dockerfile
            target: metro-now_dataloader
        restart: always
        ports:
            - 3008:3008
        env_file:
            - ".env.docker"
        depends_on:
            - postgres
            - redis-stack
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    backend-data:
    postgres-data:
