name: metro-now

services:
    web:
        image: metro-now_web
        container_name: web
        pull_policy: build
        restart: always
        init: true
        ports:
            - 3000:3000
        env_file:
            - ".env.web.docker"
        build:
            context: .
            dockerfile: ./Dockerfile
            target: metro-now_web

        healthcheck:
            test: ["CMD", "curl", "-f", "http://host.docker.internal:3000/"]
            interval: 30s
            timeout: 5s
            retries: 5

    redis:
        image: redis:latest
        container_name: redis
        restart: always
        ports:
            - 6479:6379
        extra_hosts:
            - "host.docker.internal:host-gateway"

    postgres:
        container_name: postgres
        image: postgres:16-alpine
        restart: always
        ports:
            - 5532:5432
        volumes:
            - postgres-data:/var/lib/postgresql/data/
        env_file:
            - ".env.docker"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 10

    migrations:
        image: metro-now_migrations
        container_name: migrations
        pull_policy: build
        build:
            context: .
            dockerfile: ./Dockerfile
            target: metro-now_migrations
        restart: "no"
        env_file:
            - ".env.docker"
        depends_on:
            postgres:
                condition: service_healthy
        extra_hosts:
            - "host.docker.internal:host-gateway"

    backend:
        image: metro-now_backend
        container_name: backend
        pull_policy: build
        depends_on:
            postgres:
                condition: service_healthy
            migrations:
                condition: service_completed_successfully
            redis:
                condition: service_started
        build:
            context: .
            dockerfile: ./Dockerfile
            target: metro-now_backend

        restart: always
        init: true
        ports:
            - 3001:3001
        volumes:
            - backend-data:/app
        env_file:
            - ".env.docker"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://host.docker.internal:3001/"]
            interval: 30s
            start_period: 300s
            timeout: 10s
            retries: 5

    dataloader:
        image: metro-now_dataloader
        container_name: dataloader
        pull_policy: build
        build:
            context: .
            dockerfile: ./Dockerfile
            target: metro-now_dataloader
        restart: always
        init: true
        ports:
            - 3008:3008
        env_file:
            - ".env.docker"
        depends_on:
            postgres:
                condition: service_healthy
            migrations:
                condition: service_completed_successfully
            redis:
                condition: service_started
        extra_hosts:
            - "host.docker.internal:host-gateway"

    # Application DB for Metabase (separate from app postgres so no manual CREATE DATABASE).
    metabase-db:
        image: postgres:16-alpine
        container_name: metabase-db
        restart: always
        environment:
            POSTGRES_USER: metabase
            POSTGRES_PASSWORD: metabase
            POSTGRES_DB: metabase
        volumes:
            - metabase-db-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U metabase -d metabase"]
            interval: 5s
            timeout: 5s
            retries: 5

    metabase:
        image: metabase/metabase:latest
        container_name: metabase
        restart: always
        ports:
            - 3030:3000
        environment:
            MB_DB_TYPE: postgres
            MB_DB_HOST: metabase-db
            MB_DB_PORT: "5432"
            MB_DB_DBNAME: metabase
            MB_DB_USER: metabase
            MB_DB_PASS: metabase
        depends_on:
            metabase-db:
                condition: service_healthy

volumes:
    backend-data:
    postgres-data:
    metabase-db-data:
