name: Build

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: build-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    actions: write

jobs:
    backend:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Check out code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Setup Node.js environment
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build backend
              run: pnpm turbo run build --filter=@metro-now/backend

    dataloader:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Check out code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Setup Node.js environment
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build dataloader
              run: pnpm turbo run build --filter=@metro-now/dataloader

    mobile:
        runs-on: macos-latest
        timeout-minutes: 30

        steps:
            - name: Check out code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Build mobile
              run: |
                  xcodebuild build \
                    -project apps/mobile/metro-now/metro-now.xcodeproj \
                    -scheme metro-now \
                    -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
                    CODE_SIGNING_ALLOWED=NO

    web:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Check out code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

            - name: Setup Node.js environment
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm turbo run build --filter=@metro-now/web

    docker:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                target:
                    - metro-now_web
                    - metro-now_backend
                    - metro-now_dataloader
                    - metro-now_migrations

        steps:
            - name: Check out code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Build Docker image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: .
                  file: ./Dockerfile
                  target: ${{ matrix.target }}
                  load: true
                  tags: metro-now:${{ matrix.target }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  push: false
