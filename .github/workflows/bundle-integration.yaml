name: Bundle Integration

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: bundle-integration-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    docker-compose-bundle:
        runs-on: ubuntu-latest
        timeout-minutes: 45

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Create env files
              run: |
                  cp .env.docker.example .env.docker
                  echo "GOLEMIO_API_KEY=${{ secrets.GOLEMIO_API_KEY }}" >> .env.docker
                  echo "DB_HOST=postgres" >> .env.docker
                  echo "DB_PORT=5432" >> .env.docker
                  echo "REDIS_HOST=redis-stack" >> .env.docker
                  echo "REDIS_PORT=6379" >> .env.docker
                  cp .env.web.docker.example .env.web.docker

            - name: Start bundle
              run: docker compose up -d --build

            - name: Wait for deployed services
              run: |
                  wait_for_url() {
                    local name="$1"
                    local url="$2"
                    local attempts="${3:-60}"
                    local delay="${4:-5}"

                    for attempt in $(seq 1 "$attempts"); do
                      if curl -fsS "$url" > /dev/null; then
                        echo "$name is reachable at $url"
                        return 0
                      fi

                      echo "Waiting for $name ($attempt/$attempts): $url"
                      sleep "$delay"
                    done

                    echo "$name did not become reachable: $url"
                    return 1
                  }

                  wait_for_url "web" "http://localhost:3000/" 60 5
                  wait_for_url "backend" "http://localhost:3001/status" 90 5
                  wait_for_url "dataloader" "http://localhost:3008/health" 120 5

            - name: Verify bundle health
              run: |
                  python3 <<'PY'
                  import json
                  import urllib.request

                  def fetch_json(url: str):
                      with urllib.request.urlopen(url, timeout=30) as response:
                          return json.load(response)

                  backend_status = fetch_json("http://localhost:3001/status")
                  assert isinstance(backend_status, list) and backend_status, backend_status
                  assert all(item["status"] == "ok" for item in backend_status), backend_status

                  dataloader_health = fetch_json("http://localhost:3008/health")
                  assert dataloader_health["status"] == "ok", dataloader_health

                  dataloader_stats = fetch_json("http://localhost:3008/api/database/stats")
                  assert dataloader_stats["success"] is True, dataloader_stats
                  assert dataloader_stats["stats"]["stops"] > 0, dataloader_stats

                  query_payload = json.dumps({
                      "query": "{ stops(limit: 1) { id entrances { id name latitude longitude } } }",
                  }).encode("utf-8")
                  request = urllib.request.Request(
                      "http://localhost:3001/graphql",
                      data=query_payload,
                      headers={"Content-Type": "application/json"},
                      method="POST",
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      graphql_response = json.load(response)

                  assert "errors" not in graphql_response, graphql_response
                  stops = graphql_response["data"]["stops"]
                  assert isinstance(stops, list) and len(stops) == 1, graphql_response
                  assert "entrances" in stops[0], graphql_response
                  PY

            - name: Show compose status on failure
              if: failure()
              run: |
                  docker compose ps
                  docker compose logs --no-color

            - name: Tear down bundle
              if: always()
              run: docker compose down --volumes --remove-orphans
