query AllStopsLight($limit: Int, $offset: Int) {
  stops(limit: $limit, offset: $offset) {
    id
    name
    avgLatitude
    avgLongitude
    platforms {
      id
      latitude
      longitude
      name
      code
      isMetro
      routes {
        id
        name
        color
        feed
        vehicleType
        isNight
      }
    }
  }
}
