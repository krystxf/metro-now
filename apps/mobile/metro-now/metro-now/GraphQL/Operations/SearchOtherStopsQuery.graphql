query SearchOtherStops(
  $query: String!
  $limit: Int!
  $latitude: Float
  $longitude: Float
) {
  searchStops(
    query: $query
    limit: $limit
    latitude: $latitude
    longitude: $longitude
  ) {
    id
    name
    avgLatitude
    avgLongitude
    entrances {
      id
      name
      latitude
      longitude
    }
    platforms {
      id
      latitude
      longitude
      name
      code
      direction
      isMetro
      routes {
        id
        name
        color
        feed
        vehicleType
        isNight
      }
    }
  }
}
