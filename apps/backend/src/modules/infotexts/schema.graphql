enum InfotextPriority {
    LOW
    NORMAL
    HIGH
}

type InfotextRelatedStop {
    id: ID!
    name: String!
    platformCode: String
}

type Infotext {
    id: ID!
    text: String!
    textEn: String
    priority: InfotextPriority!
    displayType: String!

    relatedStops: [InfotextRelatedStop!]!

    validFrom: ISODateTime
    validTo: ISODateTime
}

type Query {
    infotexts: [Infotext!]!
}
