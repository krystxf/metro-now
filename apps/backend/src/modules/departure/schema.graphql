type DepartureTime {
    predicted: ISODateTime!
    scheduled: ISODateTime!
}

type Departure {
    id: ID

    """
    in seconds
    """
    delay: Int

    headsign: String
    isRealtime: Boolean!
    platformCode: String

    platform: Platform!
    departureTime: DepartureTime!
    route: Route
}

type Query {
    departures(
        stopIds: [ID!]
        platformIds: [ID!]
        """
        maximum number of departures to return (max: 100)
        """
        limit: Int
        metroOnly: Boolean
        minutesBefore: Int
        minutesAfter: Int
    ): [Departure!]!
}
