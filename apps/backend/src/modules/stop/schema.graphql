type StopEntrance {
    id: ID!
    name: String!
    latitude: Float!
    longitude: Float!
}

type Stop {
    id: ID!
    name: String!
    avgLatitude: Float!
    avgLongitude: Float!
    entrances: [StopEntrance!]!
    platforms: [Platform!]!
}

type Query {
    stops(ids: [ID!], limit: Int, offset: Int): [Stop!]!
    stop(id: ID!): Stop
}
