type StopEntrance {
    id: ID!
    name: String!
    latitude: Float!
    longitude: Float!
}

type Stop {
    id: ID!
    feed: Feed!
    name: String!
    avgLatitude: Float!
    avgLongitude: Float!
    entrances: [StopEntrance!]!
    platforms: [Platform!]!
    """
    True if any platform at this stop is a metro/subway platform.
    Pre-computed so map clients don't need to fetch platforms.
    """
    isMetro: Boolean!
    """
    Distinct vehicle types across all routes serving this stop.
    Pre-computed so map clients don't need to fetch platforms/routes.
    """
    vehicleTypes: [VehicleType!]!
}

type StopWithDistance {
    id: ID!
    feed: Feed!
    name: String!
    avgLatitude: Float!
    avgLongitude: Float!
    entrances: [StopEntrance!]!
    platforms: [Platform!]!
    isMetro: Boolean!
    vehicleTypes: [VehicleType!]!
    distance: Float!
}

type Query {
    stops(ids: [ID!], limit: Int, offset: Int): [Stop!]!
    stop(id: ID!): Stop
    searchStops(
        query: String!
        limit: Int
        offset: Int
        latitude: Float
        longitude: Float
    ): [Stop!]!
    closestStops(
        latitude: Float!
        longitude: Float!
        limit: Int
    ): [StopWithDistance!]!
    stopDataLastUpdatedAt: ISODateTime
}
